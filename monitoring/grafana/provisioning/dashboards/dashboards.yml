# =============================================================================
# Claw Agents Provisioner -- Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads dashboard JSON files from the provisioned directory.
# =============================================================================

apiVersion: 1

providers:
  - name: "Claw Dashboards"
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
