# =============================================================================
# Claw Agents Provisioner -- Promtail Configuration
# =============================================================================
# Log collector that reads Docker container logs and ships them to Loki.
# Uses Docker service discovery to automatically find containers.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # -----------------------------------------------------------------------
  # Docker container logs
  # -----------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Keep container name as label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container_name"

      # Keep compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"

      # Keep compose project name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "compose_project"

      # Set job name from compose service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "job"

      # Container ID
      - source_labels: ["__meta_docker_container_id"]
        target_label: "container_id"

    pipeline_stages:
      # Try to parse JSON logs (services using json log format)
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            service: service
      - labels:
          level:
          service:

      # Timestamp extraction from JSON logs
      - timestamp:
          source: time
          format: "2006-01-02T15:04:05.000Z"
          fallback_formats:
            - "2006-01-02T15:04:05Z"
            - "2006-01-02 15:04:05"

      # Drop health check noise (optional -- uncomment to reduce log volume)
      # - drop:
      #     source: "msg"
      #     expression: "health.*check|/health|/metrics"
