# =============================================================================
# Claw Agents Provisioner — Docker Compose Secrets Override
# =============================================================================
#
# This override file replaces env_file-based secret injection with
# vault-mounted secrets. Used automatically when secrets.vault exists.
#
# Usage (automatic via claw.sh):
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml \
#     --profile zeroclaw up -d
#
# How it works:
#   1. Only CLAW_VAULT_PASSWORD is passed as an environment variable
#   2. The vault file is bind-mounted read-only into each container
#   3. A tmpfs mount at /run/secrets/decrypted provides ephemeral storage
#   4. The entrypoint decrypts secrets from the vault into tmpfs at startup
#   5. After decryption, secrets exist only in tmpfs (RAM) — never on disk
#
# The original env_file directive is removed; non-secret config vars
# are passed individually via the environment block.
# =============================================================================

services:
  zeroclaw:
    env_file: []
    environment:
      - CLAW_VAULT_PASSWORD
      - CLAW_VAULT_FILE=/run/secrets/secrets.vault
      # Non-secret config vars (safe to expose)
      - CLAW_AGENT
      - CLAW_LLM_PROVIDER
      - CLAW_LLM_MODEL
      - CLAW_CLIENT_NAME
      - CLAW_CLIENT_INDUSTRY
      - CLAW_CLIENT_LANGUAGE
      - CLAW_DATA_SENSITIVITY
      - CLAW_STORAGE_PREFERENCE
      - CLAW_COMPLIANCE
      - CLAW_SKILLS
      - CLAW_FINETUNE_ENABLED
      - CLAW_FINETUNE_METHOD
      - CLAW_FINETUNE_BASE_MODEL
      - CLAW_FINETUNE_USE_CASE
      - CLAW_ADAPTER_PATH
      - CLAW_SYSTEM_PROMPT_ENRICHMENT
      - ZEROCLAW_VERSION
      - ZEROCLAW_LOG_LEVEL
      - ZEROCLAW_EXTRA_TOML
    volumes:
      - zeroclaw-data:/home/zeroclaw/.zeroclaw
      - ./zeroclaw/entrypoint.sh:/entrypoint.sh:ro
      - ./secrets.vault:/run/secrets/secrets.vault:ro
      - ./shared/claw_vault.py:/usr/local/bin/claw_vault.py:ro
    tmpfs:
      - /run/secrets/decrypted:size=1m,mode=0700

