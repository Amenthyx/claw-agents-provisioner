# ===================================================================
# CLAW AGENTS PROVISIONER — Pre-commit Hook Configuration
# ===================================================================
# Install: pip install pre-commit && pre-commit install
# Or run:  bash scripts/setup-hooks.sh
# Manual:  pre-commit run --all-files
# ===================================================================

repos:
  # ── Standard pre-commit hooks ────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.drawio$'
      - id: end-of-file-fixer
        exclude: '\.drawio$'
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
        exclude: '\.example\.json$'
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: no-commit-to-branch
        args: ['--branch=main']
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ── ShellCheck — bash/sh linting ─────────────────────────────────
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  # ── Hadolint — Dockerfile linting ────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        entry: hadolint
        args: ['--failure-threshold=warning']

  # ── Ruff — Python linting ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # ── detect-secrets — prevent secrets from being committed ────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(\.env\.template|\.example\.|package-lock\.json|\.drawio)$'

  # ── Local hooks — project-specific guards ────────────────────────
  - repo: local
    hooks:
      - id: no-env-files
        name: Prevent .env files from being committed
        entry: >-
          bash -c 'for f in "$@"; do if echo "$f" | grep -qE "^\.env$|/\.env$";
          then echo "BLOCKED .env file: $f"; exit 1; fi; done' --
        language: system
        pass_filenames: true

      - id: no-api-keys
        name: Check for API key patterns
        entry: >-
          bash -c 'for f in "$@"; do if grep -qE "sk-ant-|sk-or-|xoxb-|hf_[a-zA-Z0-9]{20}"
          "$f" 2>/dev/null; then echo "BLOCKED API key in $f"; exit 1; fi; done' --
        language: system
        types: [text]
        exclude: '(\.env\.template|\.md|\.yml|\.yaml)$'

      - id: no-vault-files
        name: Prevent vault files from being committed
        entry: >-
          bash -c 'for f in "$@"; do if echo "$f" | grep -qE "\.vault$";
          then echo "BLOCKED vault file: $f"; exit 1; fi; done' --
        language: system
        pass_filenames: true

      - id: python-compile-check
        name: Python syntax check (compile)
        entry: python3 -m py_compile
        language: system
        types: [python]
        pass_filenames: true
