name: CI — Claw Agents Provisioner

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Lint: shellcheck for all .sh files
  # ---------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all shell scripts
        run: |
          FAIL=0
          find . -name "*.sh" -type f | while read -r script; do
            echo "Checking: ${script}"
            shellcheck --severity=warning "${script}" || FAIL=1
          done
          exit ${FAIL}

  # ---------------------------------------------------------------
  # Lint: hadolint for all Dockerfiles
  # ---------------------------------------------------------------
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint on all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "zeroclaw/Dockerfile"
          failure-threshold: warning
        continue-on-error: true

      - name: Hadolint — NanoClaw
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "nanoclaw/Dockerfile"
          failure-threshold: warning
        continue-on-error: true

      - name: Hadolint — PicoClaw
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "picoclaw/Dockerfile"
          failure-threshold: warning
        continue-on-error: true

      - name: Hadolint — OpenClaw
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "openclaw/Dockerfile"
          failure-threshold: warning
        continue-on-error: true

      - name: Hadolint — Finetune
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "finetune/Dockerfile.finetune"
          failure-threshold: warning
        continue-on-error: true

      - name: Hadolint — XClaw
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "Dockerfile.xclaw"
          failure-threshold: warning
        continue-on-error: true

  # ---------------------------------------------------------------
  # Lint: ruff for Python files
  # ---------------------------------------------------------------
  ruff:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: |
          PYTHON_FILES=$(find . -name "*.py" -type f 2>/dev/null || true)
          if [ -n "${PYTHON_FILES}" ]; then
            echo "${PYTHON_FILES}" | xargs ruff check --output-format=github || true
          else
            echo "No Python files found — skipping"
          fi

      - name: Run ruff format check
        run: |
          PYTHON_FILES=$(find . -name "*.py" -type f 2>/dev/null || true)
          if [ -n "${PYTHON_FILES}" ]; then
            echo "${PYTHON_FILES}" | xargs ruff format --check || true
          else
            echo "No Python files found — skipping"
          fi

  # ---------------------------------------------------------------
  # Type check: mypy for shared Python modules
  # ---------------------------------------------------------------
  mypy:
    name: Mypy (Type Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy on shared modules
        run: |
          mypy shared/claw_router.py \
               shared/claw_memory.py \
               shared/claw_rag.py \
               shared/claw_security.py \
               shared/claw_orchestrator.py \
            --config-file mypy.ini || true

  # ---------------------------------------------------------------
  # Python tests — Matrix (3.8, 3.10, 3.12)
  # ---------------------------------------------------------------
  pytest-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov cryptography
          if [ -f finetune/requirements.txt ]; then
            pip install -r finetune/requirements.txt 2>/dev/null || true
          fi

      - name: Run unit tests
        run: |
          if [ -d tests/ ]; then
            pytest tests/ \
              --ignore=tests/test_integration*.py \
              --ignore=tests/test_e2e*.py \
              -v --tb=short \
              --junitxml=test-results/unit-${{ matrix.python-version }}.xml \
              --cov=shared --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
              --cov-report=term-missing \
              || true
          else
            echo "No tests directory found — skipping"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: |
            test-results/
            coverage-${{ matrix.python-version }}.xml
          retention-days: 30

  # ---------------------------------------------------------------
  # Integration tests (Python 3.11)
  # ---------------------------------------------------------------
  pytest-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: pytest-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-3.11-

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov cryptography
          if [ -f finetune/requirements.txt ]; then
            pip install -r finetune/requirements.txt 2>/dev/null || true
          fi

      - name: Run integration tests
        run: |
          INTEGRATION_TESTS=$(find tests/ -name "test_integration*.py" -type f 2>/dev/null || true)
          if [ -n "${INTEGRATION_TESTS}" ]; then
            pytest ${INTEGRATION_TESTS} \
              -v --tb=short \
              --junitxml=test-results/integration.xml \
              || true
          else
            echo "No integration tests found — skipping"
          fi

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results/
          retention-days: 30

  # ---------------------------------------------------------------
  # E2E tests (Python 3.11)
  # ---------------------------------------------------------------
  pytest-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: pytest-integration
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-3.11-

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov cryptography
          if [ -f finetune/requirements.txt ]; then
            pip install -r finetune/requirements.txt 2>/dev/null || true
          fi

      - name: Run E2E tests
        run: |
          E2E_TESTS=$(find tests/ -name "test_e2e*.py" -type f 2>/dev/null || true)
          if [ -n "${E2E_TESTS}" ]; then
            pytest ${E2E_TESTS} \
              -v --tb=short \
              --junitxml=test-results/e2e.xml \
              || true
          else
            echo "No E2E tests found — skipping"
          fi

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-e2e
          path: test-results/
          retention-days: 30

  # ---------------------------------------------------------------
  # Security scanning with Bandit (Python SAST)
  # ---------------------------------------------------------------
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit on shared modules
        run: |
          bandit -r shared/ \
            -f json -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            || true

      - name: Check for HIGH/CRITICAL findings
        run: |
          if [ -f bandit-report.json ]; then
            HIGH_COUNT=$(python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          high_crit = [r for r in results if r.get('issue_severity') in ('HIGH', 'CRITICAL')]
          print(len(high_crit))
          for r in high_crit:
              print(f\"  {r['issue_severity']}: {r['issue_text']} ({r['filename']}:{r['line_number']})\", file=sys.stderr)
          ")
            echo "HIGH/CRITICAL findings: ${HIGH_COUNT}"
            if [ "${HIGH_COUNT}" -gt 0 ]; then
              echo "::error::Bandit found ${HIGH_COUNT} HIGH/CRITICAL security issues"
              exit 1
            fi
          fi

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ---------------------------------------------------------------
  # Python compile check (all shared modules)
  # ---------------------------------------------------------------
  python-compile:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python files
        run: |
          echo "Checking shared/ modules..."
          for f in shared/*.py; do
            if [ -f "$f" ]; then
              echo "  Compiling: $f"
              python3 -m py_compile "$f"
            fi
          done
          echo "Checking assessment/ modules..."
          for f in assessment/*.py; do
            if [ -f "$f" ]; then
              echo "  Compiling: $f"
              python3 -m py_compile "$f"
            fi
          done

  # ---------------------------------------------------------------
  # Security: no secrets in tracked files
  # ---------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .env files in repo
        run: |
          if git ls-files | grep -E "^\.env$|/\.env$"; then
            echo "::error::Found .env file(s) tracked in git!"
            exit 1
          else
            echo "No .env files tracked — OK"
          fi

      - name: Check for API key patterns in tracked files
        run: |
          FOUND=0
          for pattern in "sk-ant-" "sk-or-" "xoxb-" "hf_"; do
            if git grep -l "${pattern}" -- ':!.env.template' ':!*.md' ':!*.yml' 2>/dev/null; then
              echo "::warning::Found potential API key pattern '${pattern}' in tracked files"
              FOUND=1
            fi
          done
          if [ "${FOUND}" -eq 0 ]; then
            echo "No API key patterns found in tracked files — OK"
          fi

      - name: Check for client assessment files
        run: |
          if git ls-files | grep -E "client-assessment.*\.json$" | grep -v "example"; then
            echo "::error::Found client assessment file (non-example) tracked in git!"
            exit 1
          else
            echo "No client assessment files tracked — OK"
          fi

  # ---------------------------------------------------------------
  # Docker Build Matrix: agents
  # ---------------------------------------------------------------
  docker-build:
    name: Docker Build — ${{ matrix.agent }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [zeroclaw, nanoclaw, picoclaw, openclaw]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.agent }} Docker image
        run: |
          docker build \
            -t claw-${{ matrix.agent }}:ci \
            -f ${{ matrix.agent }}/Dockerfile \
            ${{ matrix.agent }}/
        timeout-minutes: 15
        continue-on-error: true

      - name: Verify image was built
        run: |
          if docker image inspect claw-${{ matrix.agent }}:ci >/dev/null 2>&1; then
            echo "Image claw-${{ matrix.agent }}:ci built successfully"
            docker image ls claw-${{ matrix.agent }}:ci
          else
            echo "::warning::Image build failed for ${{ matrix.agent }} (upstream repo may not be available)"
          fi

  # ---------------------------------------------------------------
  # Docker Compose validation
  # ---------------------------------------------------------------
  compose-validate:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
          else
            touch .env
          fi

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ---------------------------------------------------------------
  # Assessment validation (when scripts exist)
  # ---------------------------------------------------------------
  assessment:
    name: Assessment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate assessment schema
        run: |
          if [ -f assessment/validate.py ]; then
            # Find example assessments and validate them
            for f in assessment/*.example.json assessment/*.json; do
              if [ -f "$f" ]; then
                echo "Validating: $f"
                python3 assessment/validate.py "$f" || true
              fi
            done
          else
            echo "Assessment validator not yet implemented — skipping"
          fi

  # ---------------------------------------------------------------
  # Dataset validation (when datasets exist)
  # ---------------------------------------------------------------
  datasets:
    name: Dataset Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dataset structure
        run: |
          DATASET_DIR="finetune/datasets"
          if [ -d "${DATASET_DIR}" ]; then
            DATASET_COUNT=$(find "${DATASET_DIR}" -mindepth 1 -maxdepth 1 -type d | wc -l)
            echo "Found ${DATASET_COUNT} dataset directories"

            METADATA_COUNT=$(find "${DATASET_DIR}" -name "metadata.json" | wc -l)
            echo "Found ${METADATA_COUNT} metadata.json files"

            DATA_COUNT=$(find "${DATASET_DIR}" \( -name "data.jsonl" -o -name "data.csv" -o -name "data.parquet" \) | wc -l)
            echo "Found ${DATA_COUNT} data files"

            if [ "${DATASET_COUNT}" -gt 0 ]; then
              echo "Dataset directories:"
              ls -1 "${DATASET_DIR}/"
            fi
          else
            echo "Dataset directory not yet created — skipping"
          fi

      - name: Validate dataset row counts
        run: |
          if [ -f finetune/validate_datasets.py ]; then
            python3 finetune/validate_datasets.py
          else
            echo "Dataset validator not yet implemented — skipping"
          fi

  # ---------------------------------------------------------------
  # SBOM generation and validation
  # ---------------------------------------------------------------
  trivy-sbom:
    name: SBOM Generation & Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "cyclonedx"
          output: "sbom.cdx.json"

      - name: Validate SBOM structure
        run: |
          if [ -f sbom.cdx.json ]; then
            # Validate it is valid JSON and has expected CycloneDX fields
            python3 -c "
          import json, sys
          with open('sbom.cdx.json') as f:
              sbom = json.load(f)
          bom_format = sbom.get('bomFormat', '')
          spec_version = sbom.get('specVersion', '')
          components = sbom.get('components', [])
          print(f'SBOM Format: {bom_format}')
          print(f'Spec Version: {spec_version}')
          print(f'Components: {len(components)}')
          if bom_format != 'CycloneDX':
              print('ERROR: Invalid SBOM format', file=sys.stderr)
              sys.exit(1)
          print('SBOM validation: PASSED')
          "
          else
            echo "::warning::SBOM file not generated"
          fi

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "sbom.cdx.json"
          retention-days: 90

  # ---------------------------------------------------------------
  # Trivy: container image vulnerability scanning
  # ---------------------------------------------------------------
  trivy-container-scan:
    name: Trivy Container Scan — ${{ matrix.agent }}
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: zeroclaw
            dockerfile: zeroclaw/Dockerfile
            context: zeroclaw/
          - agent: nanoclaw
            dockerfile: nanoclaw/Dockerfile
            context: nanoclaw/
          - agent: picoclaw
            dockerfile: picoclaw/Dockerfile
            context: picoclaw/
          - agent: openclaw
            dockerfile: openclaw/Dockerfile
            context: openclaw/
          - agent: parlant
            dockerfile: parlant/Dockerfile
            context: parlant/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.agent }} image for scanning
        run: |
          docker build \
            -t claw-${{ matrix.agent }}:ci \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
        timeout-minutes: 15
        continue-on-error: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "claw-${{ matrix.agent }}:ci"
          format: "sarif"
          output: "trivy-${{ matrix.agent }}.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.agent }}.sarif"
          category: "trivy-${{ matrix.agent }}"

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-${{ matrix.agent }}
          path: "trivy-${{ matrix.agent }}.sarif"
          retention-days: 30

  # ---------------------------------------------------------------
  # Deployment smoke test
  # ---------------------------------------------------------------
  smoke-test:
    name: Deployment Smoke Test
    runs-on: ubuntu-latest
    needs: [pytest-unit, bandit, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cryptography

      - name: Run smoke test
        run: |
          if [ -x scripts/smoke-test.sh ]; then
            bash scripts/smoke-test.sh
          else
            echo "Smoke test script not found — running inline checks"

            # 1. Verify all shared modules import cleanly
            echo "=== Python import check ==="
            cd shared
            for f in *.py; do
              MODULE=$(basename "$f" .py)
              python3 -c "import importlib; importlib.import_module('${MODULE}')" 2>/dev/null \
                && echo "  OK: ${MODULE}" \
                || echo "  SKIP: ${MODULE} (missing dependency)"
            done
            cd ..

            # 2. Verify docker-compose.yml parses
            echo "=== Docker Compose validation ==="
            if [ -f .env.template ]; then cp .env.template .env; fi
            docker compose config --quiet && echo "  OK: docker-compose.yml"

            # 3. Verify vault CLI --help
            echo "=== Vault CLI check ==="
            python3 shared/claw_vault.py --help > /dev/null 2>&1 && echo "  OK: claw_vault.py"

            # 4. Verify security CLI --help
            echo "=== Security CLI check ==="
            python3 shared/claw_security.py --help > /dev/null 2>&1 && echo "  OK: claw_security.py"

            echo "=== Smoke test PASSED ==="
          fi
