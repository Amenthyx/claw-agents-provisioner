[mypy]
python_version = 3.9
warn_return_any = False
warn_unused_configs = True
warn_redundant_casts = True
check_untyped_defs = False
ignore_missing_imports = True
disallow_untyped_defs = False
no_implicit_optional = True
# Suppress union-attr for Optional fields used without guards (common pattern)
disable_error_code = union-attr

# Stricter checks for the shared modules we've annotated
[mypy-claw_router]
disallow_untyped_defs = True

[mypy-claw_memory]
disallow_untyped_defs = True

[mypy-claw_rag]
disallow_untyped_defs = True

[mypy-claw_security]
disallow_untyped_defs = True

[mypy-claw_orchestrator]
disallow_untyped_defs = True

# Ignore errors in transitively imported shared modules (not yet annotated)
[mypy-claw_dal]
ignore_errors = True

[mypy-claw_metrics]
ignore_errors = True

[mypy-claw_audit]
ignore_errors = True

[mypy-claw_auth]
ignore_errors = True

[mypy-claw_ratelimit]
ignore_errors = True

[mypy-claw_storage]
ignore_errors = True
