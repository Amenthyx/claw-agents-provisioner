# =============================================================================
# Claw Agents Provisioner -- TLS/SSL Configuration
# =============================================================================
# Modern TLS settings: TLS 1.2+ with strong cipher suite.
# Certificates managed by Let's Encrypt / certbot.
# =============================================================================

# TLS protocol versions (1.2 and 1.3 only)
ssl_protocols TLSv1.2 TLSv1.3;

# Prefer server ciphers (server decides, not client)
ssl_prefer_server_ciphers on;

# Modern cipher suite -- no RC4, no 3DES, no CBC-mode with TLS 1.2 issues
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Session caching for TLS resumption
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Diffie-Hellman parameter (generated at container build time)
ssl_dhparam /etc/nginx/ssl/dhparam.pem;
