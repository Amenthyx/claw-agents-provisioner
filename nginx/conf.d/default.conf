# =============================================================================
# Claw Agents Provisioner -- Server Blocks
# =============================================================================
# Reverse proxy server blocks for all Claw platform services.
# HTTP -> HTTPS redirect + TLS-terminated proxy to backend services.
#
# Services proxied:
#   /api/router/*       -> claw_router       :9095
#   /api/memory/*       -> claw_memory       :9096
#   /api/rag/*          -> claw_rag          :9097
#   /api/wizard/*       -> claw_wizard       :9098
#   /                   -> claw_dashboard    :9099
#   /api/orchestrator/* -> claw_orchestrator :9100
#   /health/*           -> claw_health       :9094
#   /api/watchdog/*     -> claw_watchdog     :9090
# =============================================================================

# -----------------------------------------------------------------------
# HTTP -> HTTPS redirect (port 80)
# -----------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------
# HTTPS server (port 443)
# -----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # TLS certificates (Let's Encrypt or self-signed for dev)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Include shared TLS settings
    include /etc/nginx/conf.d/ssl.conf;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------
    # Common proxy settings
    # -------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # -------------------------------------------------------------------
    # Dashboard (default route)
    # -------------------------------------------------------------------
    location / {
        limit_req zone=dashboard_limit burst=40 nodelay;
        proxy_pass http://claw_dashboard;
    }

    # -------------------------------------------------------------------
    # Gateway Router
    # -------------------------------------------------------------------
    location /api/router/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_router/;
    }

    # -------------------------------------------------------------------
    # Memory Service
    # -------------------------------------------------------------------
    location /api/memory/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_memory/;
    }

    # -------------------------------------------------------------------
    # RAG Service
    # -------------------------------------------------------------------
    location /api/rag/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_rag/;
    }

    # -------------------------------------------------------------------
    # Wizard API
    # -------------------------------------------------------------------
    location /api/wizard/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_wizard/;
    }

    # -------------------------------------------------------------------
    # Orchestrator
    # -------------------------------------------------------------------
    location /api/orchestrator/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_orchestrator/;
    }

    # -------------------------------------------------------------------
    # Watchdog
    # -------------------------------------------------------------------
    location /api/watchdog/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://claw_watchdog/;
    }

    # -------------------------------------------------------------------
    # Health Aggregator
    # -------------------------------------------------------------------
    location /health/ {
        limit_req zone=health_limit burst=20 nodelay;
        proxy_pass http://claw_health/health/;
    }

    location = /health {
        limit_req zone=health_limit burst=20 nodelay;
        proxy_pass http://claw_health/health;
    }

    # -------------------------------------------------------------------
    # Metrics endpoint (Prometheus scraping)
    # Internal-only: restrict to monitoring networks
    # -------------------------------------------------------------------
    location /metrics {
        # Allow internal Docker networks and localhost
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://claw_router/metrics;
    }

    # -------------------------------------------------------------------
    # Deny access to hidden files
    # -------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------
    # Custom error pages
    # -------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
