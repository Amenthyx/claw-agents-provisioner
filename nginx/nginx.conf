# =============================================================================
# Claw Agents Provisioner -- Main Nginx Configuration
# =============================================================================
# Reverse proxy with TLS termination for all Claw platform services.
# Includes rate limiting, security headers, and access logging.
#
# Usage:
#   docker compose -f docker-compose.production.yml --profile production up -d
#
# =============================================================================

user  nginx;
worker_processes  auto;
pid        /var/run/nginx.pid;

error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    log_format  json  escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  json;

    # -----------------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Hide server version
    server_tokens off;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # -----------------------------------------------------------------------
    # Rate limiting zones
    # -----------------------------------------------------------------------
    # General API rate limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Health check endpoints: higher limit (monitoring tools poll frequently)
    limit_req_zone $binary_remote_addr zone=health_limit:5m rate=60r/s;

    # Dashboard: moderate limit
    limit_req_zone $binary_remote_addr zone=dashboard_limit:5m rate=20r/s;

    # -----------------------------------------------------------------------
    # Upstream definitions (host.docker.internal resolves to Docker host)
    # -----------------------------------------------------------------------
    upstream claw_router {
        server host.docker.internal:9095;
    }

    upstream claw_memory {
        server host.docker.internal:9096;
    }

    upstream claw_rag {
        server host.docker.internal:9097;
    }

    upstream claw_wizard {
        server host.docker.internal:9098;
    }

    upstream claw_dashboard {
        server host.docker.internal:9099;
    }

    upstream claw_orchestrator {
        server host.docker.internal:9100;
    }

    upstream claw_health {
        server host.docker.internal:9094;
    }

    upstream claw_watchdog {
        server host.docker.internal:9090;
    }

    # -----------------------------------------------------------------------
    # Include server blocks and TLS config
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
