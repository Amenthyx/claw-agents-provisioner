  # ─── Wizard (port 9098) ──────────────────────────────────────────────

  /api/wizard/platforms:
    get:
      tags: [Wizard]
      summary: List platforms
      description: Returns the five Claw agent platforms with metadata.
      responses:
        "200":
          description: Platform list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardPlatformsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/wizard/assess:
    post:
      tags: [Wizard]
      summary: Submit assessment
      description: |
        Validates the form data, builds the assessment JSON structure,
        and writes it to `client-assessment.json`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WizardAssessRequest"
      responses:
        "200":
          description: Assessment saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardAssessResponse"
        "400":
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardAssessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Validation errors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardAssessResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: Failed to write assessment file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardAssessResponse"

  /api/wizard/preview:
    get:
      tags: [Wizard]
      summary: Preview assessment resolution
      description: |
        Runs resolve.py on the current `client-assessment.json` and returns
        the platform resolution result.
      responses:
        "200":
          description: Resolution preview.
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/wizard/deploy:
    post:
      tags: [Wizard]
      summary: Trigger deployment
      description: |
        Triggers `claw.sh deploy` in a background thread using the current
        `client-assessment.json`. Returns immediately.
      responses:
        "200":
          description: Deployment started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardDeployResponse"
        "400":
          description: No assessment file exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardDeployResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Deployment already in progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardDeployResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/wizard/status:
    get:
      tags: [Wizard]
      summary: Deployment status
