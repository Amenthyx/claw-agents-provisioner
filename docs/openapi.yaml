      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagIngestRequest"
      responses:
        "200":
          description: Ingestion completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagIngestResponse"
        "400":
          description: Missing path field or unsupported file type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File or directory not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/rag/search:
    post:
      tags: [RAG]
      summary: Search indexed chunks
      description: |
        Searches the trigram index for the specified agent using
        Jaccard similarity scoring.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagSearchRequest"
      responses:
        "200":
          description: Search results with similarity scores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagSearchResponse"
        "400":
          description: Missing query field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /v1/search:
    post:
      tags: [RAG]
      summary: Search (OpenAI-compatible)
      description: |
        OpenAI-compatible search endpoint that returns results in the
        standard `{"object": "list", "data": [...]}` format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagV1SearchRequest"
      responses:
        "200":
          description: Search results in OpenAI format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagV1SearchResponse"
        "400":
          description: Missing query/input field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/rag/status:
    get:
