        "200":
          description: Index statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/rag/clear:
    delete:
