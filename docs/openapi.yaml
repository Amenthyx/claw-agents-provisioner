openapi: 3.1.0
info:
  title: Claw Agents Provisioner API
  description: |
    Comprehensive API documentation for all six HTTP micro-services that make up
    the Claw Agents Provisioner ecosystem.  Each service runs on its own port and
    provides a focused set of capabilities for multi-agent orchestration,
    model routing, conversation memory, RAG search, assessment wizardry, and
    enterprise dashboard management.

    **Authentication** -- All endpoints (except `/health` and `/metrics`) require
    a Bearer token passed in the `Authorization` header.  The token is validated
    against the `CLAW_API_TOKEN` environment variable.  When the variable is
    unset, authentication is disabled (development mode).

    **Rate Limiting** -- Every authenticated endpoint enforces a sliding-window
    rate limit (default 60 req/60 s, configurable via `CLAW_RATE_LIMIT` and
    `CLAW_RATE_WINDOW` environment variables).  Rate-limit metadata is returned
    in `X-RateLimit-Limit`, `X-RateLimit-Remaining`, and `X-RateLimit-Reset`
    response headers.
  version: 1.0.0
  contact:
    name: Mauro Tommasi
    url: https://linkedin.com/in/maurotommasi
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:9095
    description: Claw Router (Model Gateway)
  - url: http://localhost:9096
    description: Claw Memory (Conversation Engine)
  - url: http://localhost:9097
    description: Claw RAG (Retrieval-Augmented Generation)
  - url: http://localhost:9098
    description: Claw Wizard (Assessment Web Wizard)
  - url: http://localhost:9099
    description: Claw Dashboard (Enterprise Web Dashboard)
  - url: http://localhost:9100
    description: Claw Orchestrator (Multi-Agent Orchestration)

tags:
  - name: Router
    description: |
      OpenAI-compatible model gateway with task-type detection, strategy-based
      routing, and automatic failover between local runtimes and cloud providers.
      Default port **9095**.
  - name: Memory
    description: |
      SQLite-backed conversation memory engine with per-agent history,
      full-text search, cross-agent context sharing, and retention policies.
      Default port **9096**.
  - name: RAG
    description: |
      Stdlib-only retrieval-augmented generation pipeline using trigram-based
      Jaccard similarity.  Per-agent knowledge bases with file ingestion
      and chunk-level search.  Default port **9097**.
  - name: Wizard
    description: |
      Multi-step web form that guides users through assessment creation.
      Generates `client-assessment.json` and can trigger deployment.
      Default port **9098**.
  - name: Dashboard
    description: |
      Enterprise web dashboard for fleet management, monitoring, strategy,
      hardware, fine-tuning, security, cost analytics, and audit.
      Default port **9099**.
  - name: Orchestrator
    description: |
      Multi-agent orchestration engine with SQLite task queue, agent registry,
      capability-based routing, pipeline execution, health monitoring, and
      event bus.  Default port **9100**.

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Pass the value of `CLAW_API_TOKEN` as a Bearer token.
        When `CLAW_API_TOKEN` is not set, auth is disabled (dev mode).

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed per rate-limit window.
      schema:
        type: integer
        example: 60
    X-RateLimit-Remaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
        example: 58
    X-RateLimit-Reset:
      description: Unix timestamp when the current window resets.
      schema:
        type: integer
        example: 1709312460

  schemas:
    # ---- Shared ----
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Not found"

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: claw-router
        version:
          type: string
          example: "1.0.0"

    PrometheusMetrics:
      type: string
      description: Prometheus text exposition format metrics.
      example: |
        # HELP claw_requests_total Total requests served
        # TYPE claw_requests_total counter
        claw_requests_total 42

    # ---- Router ----
    RouterRootResponse:
      type: object
      properties:
        service:
          type: string
          example: claw-router
        version:
          type: string
          example: "1.0.0"
        status:
          type: string
          example: ok
        description:
          type: string
        models_loaded:
          type: integer
          example: 5
        endpoints:
          type: object
          additionalProperties:
            type: string

    OpenAIModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: claude-3-5-sonnet-20241022
              object:
                type: string
                example: model
              created:
                type: integer
              owned_by:
                type: string
                example: anthropic

    ChatCompletionRequest:
      type: object
      required:
        - messages
      properties:
        model:
          type: string
          example: auto
          description: Model ID or "auto" for task-based routing.
        messages:
          type: array
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        temperature:
          type: number
          example: 0.7
        max_tokens:
          type: integer
          example: 4096
        stream:
          type: boolean
          default: false

    ChatCompletionResponse:
      type: object
      description: Standard OpenAI-compatible chat completion response.
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    RouterStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: running
        uptime:
          type: string
          example: "2h 15m 30s"
        uptime_seconds:
          type: number
          example: 8130.0
        requests_served:
          type: integer
        requests_failed:
          type: integer
        strategy:
          type: object
          properties:
            loaded:
              type: boolean
            version:
              type: string
            generated_at:
              type: string
            total_models:
              type: integer
            task_routes:
              type: integer
        backends:
          type: array
          items:
            type: object
            properties:
              runtime:
                type: string
                example: ollama
              base_url:
                type: string
                example: "http://localhost:11434/v1"
              healthy:
                type: boolean

    RouterLogsResponse:
      type: object
      properties:
        count:
          type: integer
        logs:
          type: array
          items:
            type: object

    RouterReloadResponse:
      type: object
      properties:
        status:
          type: string
          enum: [reloaded, failed]
        task_routes:
          type: integer
        total_models:
          type: integer

    # ---- Memory ----
    Conversation:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    Message:
      type: object
      properties:
        id:
          type: string
        conversation_id:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        tokens:
          type: integer
        created_at:
          type: string
          format: date-time

    ConversationListResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"

    MemoryStatsResponse:
      type: object
      description: Usage statistics for conversation memory.

    MemorySearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          example: "error handling"
        agent_id:
          type: string
          description: Optional filter by agent.
        limit:
          type: integer
          default: 50

    MemorySearchResponse:
      type: object
      properties:
        query:
          type: string
        count:
          type: integer
        results:
          type: array
          items:
            type: object

    MemoryShareRequest:
      type: object
      required:
        - from_agent
        - to_agent
        - conversation_id
        - context_summary
      properties:
        from_agent:
          type: string
          example: nanoclaw
        to_agent:
          type: string
          example: openclaw
        conversation_id:
          type: string
        context_summary:
          type: string

    CreateConversationRequest:
      type: object
      required:
        - agent_id
      properties:
        agent_id:
          type: string
          example: zeroclaw
        id:
          type: string
          description: Optional custom conversation ID.

    AddMessageRequest:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        tokens:
          type: integer
          default: 0

    # ---- RAG ----
    RagIngestRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: File or directory path to ingest.
          example: /data/docs/manual.md
        agent_id:
          type: string
          default: default
          example: zeroclaw

    RagIngestResponse:
      type: object
      properties:
        ok:
          type: boolean
        files_processed:
          type: integer
        chunks_created:
          type: integer

    RagSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          example: "deployment configuration"
        agent_id:
          type: string
          default: default
        top_k:
          type: integer
          default: 5

    RagSearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        query:
          type: string
        agent_id:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              score:
                type: number
              chunk_id:
                type: string
              source_file:
                type: string
              position:
                type: integer
        count:
          type: integer

    RagV1SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search query (also accepts "input" key).
        input:
          type: string
          description: Alias for query (OpenAI compatibility).
        agent_id:
          type: string
          default: default
        top_k:
          type: integer
          description: Number of results (also accepts "n" key).
          default: 5
        "n":
          type: integer
          description: Alias for top_k (OpenAI compatibility).

    RagV1SearchResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              score:
                type: number
              metadata:
                type: object
                properties:
                  chunk_id:
                    type: string
                  source_file:
                    type: string
                  position:
                    type: integer
        model:
          type: string
          example: claw-rag-trigram
        usage:
          type: object
          properties:
            total_chunks_searched:
              type: integer

    RagStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        total_agents:
          type: integer
        total_chunks:
          type: integer

    RagClearRequest:
      type: object
      properties:
        agent_id:
          type: string
          description: Agent knowledge base to clear. Omit to clear all.

    RagClearResponse:
      type: object
      properties:
        ok:
          type: boolean
        cleared:
          type: string
          example: all

    # ---- Wizard ----
    WizardPlatformsResponse:
      type: object
      properties:
        platforms:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: zeroclaw
              name:
                type: string
                example: ZeroClaw
              language:
                type: string
                example: Rust
              memory:
                type: string
                example: "512 MB"
              port:
                type: integer
                example: 3100
              description:
                type: string

    WizardAssessRequest:
      type: object
      required:
        - company_name
        - industry
        - team_size
        - service_package
        - complexity_level
        - primary_channel
        - monthly_api_budget
        - deployment_method
      properties:
        company_name:
          type: string
          example: Acme Corp
        industry:
          type: string
          enum:
            - technology
            - healthcare
            - finance
            - real-estate
            - education
            - retail
            - hospitality
            - legal
            - manufacturing
            - other
        team_size:
          type: string
          example: "2-10"
        service_package:
          type: string
          enum: [starter, professional, enterprise]
        primary_use_cases:
          type: array
          items:
            type: string
          example: [customer-support, knowledge-base]
        complexity_level:
          type: string
          enum: [simple, moderate, expert]
        description:
          type: string
        primary_channel:
          type: string
          enum: [web, whatsapp, telegram, discord, slack, email]
        languages:
          type: array
          items:
            type: string
          example: [en, it]
        data_sensitivity:
          type: string
          enum: [low, medium, high, critical]
        storage_preference:
          type: string
          enum: [any-cloud, private-cloud, on-premise, eu-only]
        monthly_api_budget:
          type: number
          example: 50
        deployment_method:
          type: string
          enum: [docker, vagrant]

    WizardAssessResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        path:
          type: string
        errors:
          type: array
          items:
            type: string

    WizardDeployResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        error:
          type: string

    WizardStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [idle, running, success, failed]
        message:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    # ---- Dashboard ----
    AgentInfo:
      type: object
      properties:
        id:
          type: string
          example: zeroclaw
        name:
          type: string
          example: ZeroClaw
        lang:
          type: string
          example: Rust
        port:
          type: integer
          example: 3100
        memory:
          type: string
          example: "512 MB"
        status:
          type: string
          enum: [running, stopped, error, degraded]

    DashboardStatusResponse:
      type: object
      properties:
        agents_total:
          type: integer
        agents_running:
          type: integer
        strategy_configured:
          type: boolean
        hardware_detected:
          type: boolean
        security_configured:
          type: boolean
        adapter_count:
          type: integer
        dashboard_port:
          type: integer
          example: 9099
        timestamp:
          type: string
          format: date-time

    MonitoringResponse:
      type: object
      properties:
        router:
          type: object
          nullable: true
        optimizer:
          type: object
          nullable: true
        _watchdog:
          type: object
          nullable: true
        model_usage:
          type: array
          items:
            type: object
        log_levels:
          type: object
        cache:
          type: object

    BudgetsResponse:
      type: object
      properties:
        violations:
          type: array
          items:
            type: object
        daily_spend:
          type: number
        weekly_spend:
          type: number
        monthly_spend:
          type: number
        config:
          type: object
          nullable: true

    AuditResponse:
      type: object
      properties:
        audit:
          type: array
          items:
            type: object
        alerts:
          type: array
          items:
            type: object

    SecurityEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
        summary:
          type: object

    AgentActionRequest:
      type: object
      description: No body required. Action is encoded in the URL path.

    AgentActionResponse:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string

    StrategySaveRequest:
      type: object
      description: Full strategy.json content. Must contain "rules", "task_routing", or "optimization".

    FineTuneRequest:
      type: object
      required:
        - adapter_id
      properties:
        adapter_id:
          type: string
          example: customer-support-v2

    ActivityClawDetail:
      type: object
      properties:
        claw_id:
          type: string
        status:
          type: string
        name:
          type: string
        platform:
          type: string
        port:
          type: integer
        router:
          type: object
          nullable: true
        watchdog:
          type: object
          nullable: true
        conversations:
          type: array
          items:
            type: object
        recent_requests:
          type: array
          items:
            type: object

    # ---- Orchestrator ----
    OrchestratorStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: running
        started_at:
          type: string
          format: date-time
        agents:
          type: object
          properties:
            total:
              type: integer
            healthy:
              type: integer
            unhealthy:
              type: integer
        tasks:
          type: object
          description: Task counts by status.
        uptime_check:
          type: string
          format: date-time

    OrchestratorAgent:
      type: object
      properties:
        platform:
          type: string
        endpoint:
          type: string
        port:
          type: integer
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [healthy, unhealthy, unknown]
        current_load:
          type: integer
        max_load:
          type: integer

    SubmitTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Analyze CSV data
        description:
          type: string
        priority:
          type: integer
          default: 3
          minimum: 1
          maximum: 5
        agent:
          type: string
          description: Optional agent hint for manual routing.
          example: picoclaw

    SubmitTaskResponse:
      type: object
      properties:
        task_id:
          type: string
        task:
          type: object

    CompleteTaskRequest:
      type: object
      properties:
        result:
          type: string
          description: Task result or output summary.

    CreatePipelineRequest:
      type: object
      required:
        - name
        - steps
      properties:
        name:
          type: string
          example: data-pipeline
        steps:
          type: array
          items:
            type: object
            properties:
              agent:
                type: string
              task:
                type: string

    CreatePipelineResponse:
      type: object
      properties:
        pipeline_id:
          type: string

    PipelineStatusResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        steps:
          type: array
          items:
            type: object
        tasks:
          type: array
          items:
            type: object

    EventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              event_type:
                type: string
              source:
                type: string
              target:
                type: string
              payload:
                type: object
              timestamp:
                type: string
                format: date-time
        total:
          type: integer

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Missing Authorization header. Expected: Bearer <token>"
    RateLimited:
      description: Rate limit exceeded.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Rate limit exceeded. Try again later."
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Not found"
    ServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Internal server error"

# =========================================================================
#  PATHS
# =========================================================================
paths:

  # ─── Router (port 9095) ───────────────────────────────────────────────

  /health:
    get:
      tags: [Router, RAG, Memory, Orchestrator]
      summary: Health check
      description: |
        Returns service health status. Bypasses authentication and rate limiting.
        Available on Router (9095), Memory (9096), RAG (9097), and Orchestrator (9100).
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      tags: [Router, Memory, RAG, Wizard, Dashboard, Orchestrator]
      summary: Prometheus metrics
      description: |
        Returns Prometheus text exposition metrics. Bypasses authentication and
        rate limiting. Available on all six services.
      security: []
      responses:
        "200":
          description: Prometheus metrics in text format.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PrometheusMetrics"

  /:
    get:
      tags: [Router]
      summary: Router service info
      description: Returns service metadata, version, and endpoint listing.
      responses:
        "200":
          description: Router service information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterRootResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/models:
    get:
      tags: [Router]
      summary: List available models
      description: |
        OpenAI-compatible model listing endpoint. Returns all models
        configured in strategy.json.
      responses:
        "200":
          description: List of available models.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIModelList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: Strategy not loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chat/completions:
    post:
      tags: [Router]
      summary: Chat completions (OpenAI-compatible)
      description: |
        Main proxy endpoint. Accepts OpenAI-compatible chat completion requests,
        detects the task type from message content, routes to the best available
        model based on strategy.json, and returns the upstream response.
        Supports streaming via `stream: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion response from the routed model.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          description: Router not initialized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/router/status:
    get:
      tags: [Router]
      summary: Router status and statistics
      description: |
        Returns uptime, request counts, strategy info, and backend
        health status for all configured local runtimes.
      responses:
        "200":
          description: Router status.
          content:
