        "200":
          description: Deployment status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

