      responses:
        "200":
          description: Agent list with status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/agents/{id}/{action}:
    post:
      tags: [Dashboard]
      summary: Start, stop, or restart an agent
      description: |
        Executes the specified action on an agent platform via `claw.sh`.
        Valid actions are `start`, `stop`, and `restart`.
      parameters:
        - name: id
          in: path
          required: true
          description: Agent platform ID (zeroclaw, nanoclaw, picoclaw, openclaw, parlant).
          schema:
            type: string
            enum: [zeroclaw, nanoclaw, picoclaw, openclaw, parlant]
        - name: action
          in: path
          required: true
          description: Action to perform.
          schema:
            type: string
            enum: [start, stop, restart]
      responses:
        "200":
          description: Action result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentActionResponse"
        "400":
          description: Invalid path or unknown action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

