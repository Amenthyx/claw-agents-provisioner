  /api/router:
    get:
      tags: [Dashboard]
      summary: Router status proxy
      description: Proxies to the Router service's /api/router/status endpoint.
      responses:
        "200":
          description: Router status (proxied).
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/providers:
    get:
      tags: [Dashboard]
      summary: Provider health
      description: |
        Proxies to the Optimizer service and returns provider health
        and optimization rules.
      responses:
        "200":
          description: Provider health data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_health:
                    type: object
                  rules_status:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/budgets:
    get:
      tags: [Dashboard]
      summary: Budget status
      description: Returns budget violations, daily/weekly/monthly spend, and budget config.
      responses:
        "200":
          description: Budget status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/audit:
    get:
      tags: [Dashboard]
      summary: Audit log and alerts
      description: Returns recent audit log entries and alert history.
      responses:
        "200":
          description: Audit data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/activity/stream:
    get:
      tags: [Dashboard]
      summary: Live activity stream (SSE)
      description: |
        Server-Sent Events endpoint for real-time activity monitoring.
        Sends heartbeats every 15 seconds to keep the connection alive.
      responses:
        "200":
          description: SSE event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE-formatted events.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/activity/claw/{claw_id}:
    get:
      tags: [Dashboard]
      summary: Per-claw activity detail
      description: |
        Returns detailed activity information for a specific deployed
        claw instance, including router stats, watchdog data, conversations,
        and recent LLM requests.
      parameters:
        - name: claw_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claw detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityClawDetail"
        "400":
          description: Missing claw_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/activity/requests:
    get:
      tags: [Dashboard]
      summary: Recent LLM requests
      description: Returns the 50 most recent LLM requests across all agents.
      responses:
        "200":
          description: Recent LLM requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/docs:
    get:
      tags: [Dashboard]
      summary: API documentation
      description: Serves the Swagger UI page for interactive API exploration.
      security: []
      responses:
        "200":
          description: Swagger UI HTML page.
          content:
            text/html:
              schema:
                type: string

  # ─── Orchestrator (port 9100) ────────────────────────────────────────

  /api/orchestrator/status:
    get:
      tags: [Orchestrator]
      summary: Orchestrator status
      description: |
        Returns overall orchestrator health including agent counts,
        task counts by status, and uptime.
      responses:
        "200":
          description: Orchestrator status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestratorStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/agents:
    get:
      tags: [Orchestrator]
      summary: List agents
      description: Returns all registered agents with health status and load.
      responses:
        "200":
          description: Agent list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrchestratorAgent"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/agents/{id}/health:
    post:
      tags: [Orchestrator]
      summary: Trigger agent health check
      description: Manually triggers a health check for the specified agent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agent:
                    type: string
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: Agent is unhealthy.
          content:
            application/json:
              schema:
                type: object

  /api/orchestrator/tasks:
    get:
      tags: [Orchestrator]
      summary: List tasks
      description: Returns all tasks, optionally filtered by status.
      parameters:
        - name: status
          in: query
          description: Filter by task status (pending, assigned, running, completed, failed).
          schema:
            type: string
      responses:
        "200":
          description: Task list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      tags: [Orchestrator]
      summary: Submit a new task
      description: |
        Submits a new task to the queue. If no agent hint is provided,
        the orchestrator auto-routes based on task keywords and agent
        capabilities.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTaskRequest"
      responses:
        "201":
          description: Task submitted and optionally auto-routed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitTaskResponse"
        "400":
          description: Missing title.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/tasks/{id}:
    get:
      tags: [Orchestrator]
      summary: Get task details
      description: Returns full details for a specific task by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details.
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/tasks/{id}/complete:
    post:
      tags: [Orchestrator]
      summary: Mark task complete
      description: Marks a task as completed with an optional result summary.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskRequest"
      responses:
        "200":
          description: Task marked complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  task_id:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task already completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/pipeline:
    post:
      tags: [Orchestrator]
      summary: Create a pipeline
      description: |
        Creates a multi-step pipeline with ordered agent steps.
        Each step specifies an agent and a task description.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePipelineRequest"
      responses:
        "201":
          description: Pipeline created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipelineResponse"
        "400":
          description: Missing name or steps.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/pipeline/{id}:
    get:
      tags: [Orchestrator]
      summary: Get pipeline status
      description: Returns pipeline details including all step tasks.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline status with tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Pipeline not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/pipeline/{id}/execute:
    post:
      tags: [Orchestrator]
      summary: Start pipeline execution
      description: Begins executing pipeline steps in order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline execution started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  pipeline_id:
                    type: string
                  status:
                    type: string
                    example: running
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Pipeline not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Pipeline already completed or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/orchestrator/events:
    get:
      tags: [Orchestrator]
      summary: Recent events
      description: Returns recent event bus messages with optional agent filter.
      parameters:
        - name: agent_id
          in: query
          description: Filter events by agent ID.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of events to return.
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Event list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
